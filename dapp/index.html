<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark" />
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'self'; base-uri 'self'; frame-ancestors 'none'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self' http://127.0.0.1:9545 http://localhost:9545; img-src 'self' data:;"
  />
  <title>ForteL2 Guestbook</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600&family=Syne:wght@600;700;800&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="atmosphere" aria-hidden="true"></div>
  <main class="shell">
    <header class="hero">
      <p class="brand">ForteL2</p>
      <h1 class="headline">Sign the chain.</h1>
      <p class="lede">
        A guestbook on your local OP Stack rollup — connect MetaMask on chain&nbsp;901, then leave a message.
      </p>
      <div class="actions" role="group" aria-label="Wallet">
        <button type="button" id="connect" class="btn btn-primary">Connect wallet</button>
        <button type="button" id="refresh" class="btn btn-ghost">Refresh</button>
      </div>
      <p id="status" class="status" role="status" aria-live="polite"></p>
    </header>

    <section class="compose" aria-label="Write a message">
      <label class="sr-only" for="text">Message</label>
      <div class="compose-row">
        <input
          id="text"
          type="text"
          maxlength="280"
          autocomplete="off"
          spellcheck="true"
          placeholder="Write a short message…"
          disabled
        />
        <button type="button" id="sign" class="btn btn-primary" disabled>Sign</button>
      </div>
      <p class="hint"><span id="char-count">0</span>/280 bytes</p>
    </section>

    <section class="feed" aria-label="On-chain messages">
      <h2 class="feed-title">Messages</h2>
      <ul id="messages" class="messages"></ul>
      <p id="empty" class="empty hidden">No messages yet — be the first to sign.</p>
    </section>
  </main>
  <script type="module" src="./app.js"></script>
</body>
</html>
