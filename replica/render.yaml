# Render Blueprint — Phase 3 L2 verifier (stock op-geth + op-node).
# Private service: JSON-RPC stays off the public internet (matches US-031 default).
# Adjust plan/disk for your account.
#
# Before deploy: FORTEL2_ENV=.env.sepolia ./scripts/pack-replica-artifacts.sh
# Then add Render secret files at /config/genesis.json and /config/rollup.json

services:
  - type: pserv
    name: fortel2-replica
    runtime: docker
    plan: starter
    dockerfilePath: ./replica/Dockerfile
    dockerContext: ./replica
    region: oregon
    disk:
      name: fortel2-replica-data
      mountPath: /data
      sizeGB: 20
    envVars:
      - key: L1_RPC_URL
        sync: false
      - key: JWT_SECRET
        sync: false
